<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Blood Drop Gradient -->
    <linearGradient id="dropGrad" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#ff3b30" />
      <stop offset="60%" stop-color="#e01e1e" />
      <stop offset="100%" stop-color="#990000" />
    </linearGradient>
    
    <!-- Glossy Highlight Gradient -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Base Shadow -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="180" rx="60" ry="10" fill="url(#shadowGrad)" />

  <!-- IV Stand and Bag (Left side, around x=50, y=30 to 140) -->
  <path d="M 40 20 L 40 178" stroke="#7f8c8d" stroke-width="4" stroke-linecap="round" />
  <path d="M 40 20 L 52 25" fill="none" stroke="#7f8c8d" stroke-width="3.5" stroke-linecap="round" />
  
  <!-- Hanging IV Bag Outline -->
  <rect x="25" y="40" width="30" height="52" fill="#eef2f3" opacity="0.9" stroke="#7f8c8d" stroke-width="2.5" rx="5" />
  <!-- Bottom connection of IV bag -->
  <path d="M 37 92 L 43 92 L 40 102 Z" fill="#7f8c8d" />
  <!-- Red Liquid inside bag (half full) -->
  <rect x="27.5" y="62" width="25" height="28" fill="#e01e1e" rx="2" />
  <!-- White cross on IV Bag -->
  <path d="M 36 74 L 44 74 M 40 70 L 40 78" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />

  <!-- Tube connecting IV to Drop -->
  <path d="M 40 102 C 30 130, 80 150, 94 135" fill="none" stroke="#7f8c8d" stroke-width="2.5" stroke-linecap="round" />

  <!-- Legs of Mascot (Right aligned, center around x=122) -->
  <path d="M 108 155 L 108 175" stroke="#222" stroke-width="8" stroke-linecap="round" />
  <path d="M 140 155 L 140 175" stroke="#222" stroke-width="8" stroke-linecap="round" />

  <!-- Sneakers -->
  <!-- Left Sneaker -->
  <path d="M 90 175 C 90 166, 118 166, 118 175 C 118 181, 105 183, 90 180 Z" fill="#ff3b30" stroke="#222" stroke-width="3.5" />
  <ellipse cx="104" cy="179" rx="10" ry="3" fill="#ffffff" />
  <path d="M 88 178 L 120 178" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />

  <!-- Right Sneaker -->
  <path d="M 128 175 C 128 166, 156 166, 156 175 C 156 181, 143 183, 128 180 Z" fill="#ff3b30" stroke="#222" stroke-width="3.5" />
  <ellipse cx="142" cy="179" rx="10" ry="3" fill="#ffffff" />
  <path d="M 126 178 L 158 178" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />

  <!-- Main Blood Drop Body (Centred at x=124, y=100) -->
  <path d="M 124 35 C 124 35, 179 98, 179 127 C 179 156, 154 160, 124 160 C 94 160, 69 156, 69 127 C 69 98, 124 35, 124 35 Z" fill="url(#dropGrad)" stroke="#222" stroke-width="4.5" stroke-linejoin="round" />

  <!-- Glossy Highlight -->
  <path d="M 124 45 C 124 45, 162 95, 162 118 C 162 125, 158 128, 154 122 C 146 110, 124 55, 124 45 Z" fill="url(#glossGrad)" />
  <ellipse cx="100" cy="110" rx="7" ry="15" fill="#ffffff" opacity="0.18" transform="rotate(-15, 100, 110)" />

  <!-- Face details (Centered on Mascot) -->
  <!-- Left Eye -->
  <ellipse cx="108" cy="110" rx="9" ry="14" fill="#ffffff" stroke="#222" stroke-width="3" />
  <ellipse cx="110" cy="108" rx="4.5" ry="7" fill="#000000" />
  <circle cx="108" cy="104" r="2" fill="#ffffff" />
  
  <!-- Right Eye -->
  <ellipse cx="140" cy="110" rx="9" ry="14" fill="#ffffff" stroke="#222" stroke-width="3" />
  <ellipse cx="138" cy="108" rx="4.5" ry="7" fill="#000000" />
  <circle cx="136" cy="104" r="2" fill="#ffffff" />

  <!-- Eyebrows -->
  <path d="M 98 94 Q 108 91 115 97" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round" />
  <path d="M 150 94 Q 140 91 133 97" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round" />

  <!-- Big Joyful Smile -->
  <path d="M 103 125 Q 124 143 145 125" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round" />
  <path d="M 112 131 C 115 139, 133 139, 136 131 Z" fill="#ff7b7b" stroke="#222" stroke-width="2.5" />
  <ellipse cx="94" cy="122" rx="5" ry="3.5" fill="#ff8080" opacity="0.6" />
  <ellipse cx="154" cy="122" rx="5" ry="3.5" fill="#ff8080" opacity="0.6" />

  <!-- Mascot Arms -->
  <!-- Left arm holding the IV Tube -->
  <path d="M 94 135 C 80 135, 75 140, 78 128" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" />
  <circle cx="78" cy="128" r="7" fill="#ffffff" stroke="#222" stroke-width="2.5" />
  
  <!-- Right Arm waving cheerfully -->
  <path d="M 154 115 C 168 105, 178 95, 172 88" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" />
  <!-- Peace sign or waving glove -->
  <circle cx="172" cy="88" r="8" fill="#ffffff" stroke="#222" stroke-width="2.5" />
  <path d="M 168 83 L 170 76 M 174 83 L 177 75" stroke="#222" stroke-width="2.5" stroke-linecap="round" /> <!-- Peace fingers -->
</svg>
